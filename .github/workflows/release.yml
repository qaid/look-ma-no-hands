name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      HAS_SIGNING_CERT: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION != '' }}
      HAS_HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        # Skip gracefully when secrets are not configured (e.g. forks)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm /tmp/cert.p12

          # Allow codesign to access the keychain without a prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Extract signing identity name and export it for subsequent steps
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "DEVELOPER_ID_APPLICATION=$IDENTITY" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"

      - name: Build DMG
        run: ./scripts/create-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Notarize DMG
        if: env.HAS_SIGNING_CERT == 'true'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/notarize-dmg.sh "build/Look Ma No Hands ${{ steps.version.outputs.VERSION }}.dmg"

      - name: Create ZIP archive
        run: |
          cd build
          zip -r "LookMaNoHands-${{ steps.version.outputs.VERSION }}.zip" "Look Ma No Hands.app"

      - name: Generate SHA256 Checksums
        run: |
          cd build
          echo "Generating checksums for release artifacts..."
          shasum -a 256 "Look Ma No Hands ${{ steps.version.outputs.VERSION }}.dmg" > checksums.txt
          shasum -a 256 "LookMaNoHands-${{ steps.version.outputs.VERSION }}.zip" >> checksums.txt
          echo ""
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Generate SBOM (CycloneDX Format)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: build/sbom.cyclonedx.json
          upload-artifact: true

      - name: Generate SBOM (SPDX Format)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: build/sbom.spdx.json

      - name: Attest DMG Build Provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'build/Look Ma No Hands ${{ steps.version.outputs.VERSION }}.dmg'

      - name: Attest ZIP Build Provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'build/LookMaNoHands-${{ steps.version.outputs.VERSION }}.zip'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Look Ma No Hands ${{ steps.version.outputs.VERSION }}.dmg
            build/LookMaNoHands-${{ steps.version.outputs.VERSION }}.zip
            build/checksums.txt
            build/sbom.cyclonedx.json
            build/sbom.spdx.json
          generate_release_notes: true

      - name: Update Homebrew tap
        if: env.HAS_HOMEBREW_TOKEN == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Extract SHA256 of the ZIP from checksums.txt
          ZIP_SHA256=$(grep "LookMaNoHands-${VERSION}.zip" build/checksums.txt | awk '{print $1}')
          if [ -z "${ZIP_SHA256}" ]; then
            echo "Error: Could not find SHA256 for LookMaNoHands-${VERSION}.zip in checksums.txt"
            exit 1
          fi
          echo "ZIP SHA256: ${ZIP_SHA256}"

          # Clone the Homebrew tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/qaid/homebrew-lmnh.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Update version and SHA256 in the Cask formula
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/look-ma-no-hands.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${ZIP_SHA256}\"/" Casks/look-ma-no-hands.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/look-ma-no-hands.rb
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "Update to v${VERSION}"
            git push
          }

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
